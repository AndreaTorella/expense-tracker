<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>
</head>

<body>
    <main>
        <h1>Expense Tracker</h1>

        <p id="loading-message">Caricamento spese...</p>

        <p id="error-message" hidden></p>

        <section>
            <h2>Nuova spesa</h2>

            <form id="expense-form">
                <div>
                    <label for="title">Titolo</label>
                    <input type="text"
                           id="title"
                           name="title"
                           required>
                </div>

                <div>
                    <label for="amount">Importo</label>
                    <input type="number"
                           id="amount"
                           name="amount"
                           step="0.01"
                           min="0.01"
                           required>
                </div>

                <div>
                    <label for="date">Data</label>
                    <input type="date"
                           id="date"
                           name="date"
                           required>
                </div>

                <div>
                    <label for="category">Categoria</label>
                    <select id="category"
                            name="categoryId"
                            required>
                        <option value="">Seleziona una categoria</option>
                    </select>
                </div>

                <div>
                    <label for="payment-method">Metodo di pagamento</label>
                    <select id="payment-method"
                            name="paymentMethodId"
                            required>
                        <option value="">Seleziona un metodo</option>
                    </select>
                </div>

                <button type="submit">Salva spesa</button>
            </form>
        </section>

        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Titolo</th>
                    <th>Categoria</th>
                    <th>Metodo di pagamento</th>
                    <th>Importo</th>
                    <th>Azioni</th>
                </tr>
            </thead>

            <tbody id="expenses-table-body">
            </tbody>
        </table>
    </main>

    <script type="module" src="/js/main.js"></script>
</body>
</html>
